name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run tests
        run: |
          cd backend
          npm test --if-present

      - name: Validate HTML structure
        run: |
          find . -name "*.html" | head -5
          echo "HTML files found above"

      - name: Check JS files exist
        run: |
          find restaurant-manager -name "*.js" 2>/dev/null || echo "No JS files found"
